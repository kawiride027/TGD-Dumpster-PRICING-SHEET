          React.createElement("div", { style: { marginTop: 20, padding: "16px 18px", borderRadius: 14, background: "rgba(26,46,26,0.3)", border: "1px solid #1e2e1e" } },
            React.createElement("div", { style: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5, color: "#4a6b4a", marginBottom: 8 } }, "Other zips in this zone (" + zone.zips.length + " total)"),
            React.createElement("div", { style: { display: "flex", flexWrap: "wrap", gap: 5 } },
              zone.zips.slice().sort().map(z =>
                React.createElement("span", { key: z, onClick: () => handleSearch(z), style: { padding: "3px 8px", borderRadius: 6, fontSize: 11, fontFamily: "monospace", fontWeight: 600, background: z === matchedZip ? "#22c55e" : "#1e2e1e", color: z === matchedZip ? "#000" : "#6b8f6b", cursor: "pointer", transition: "all 0.15s", border: z === matchedZip ? "1px solid #22c55e" : "1px solid #2d3d2d" } }, z)
              )
            )
          )
        )
      ),

      // Empty state
      !zone && !notFound && React.createElement("div", { style: { textAlign: "center", padding: "40px 20px", color: "#3d5a3d" } },
        React.createElement("div", { style: { fontSize: 48, marginBottom: 12, opacity: 0.3 } }, "\u2315"),
        React.createElement("div", { style: { fontSize: 14, fontWeight: 600 } }, "Enter a zip code above to get started"),
        React.createElement("div", { style: { fontSize: 12, marginTop: 4, color: "#2d4a2d" } }, "Covers " + Object.keys(ZIP_MAP).length + " zip codes across " + ZONES.length + " zones")
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
